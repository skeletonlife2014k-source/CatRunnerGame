<!DOCTYPE html>
<html>
<head>
  <title>Cat Runner Stable</title>
  <style>
    body { margin:0; overflow:hidden; background:black; font-family:Arial; }

    #menu, #gameOver {
      position:absolute;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      color:white;
      text-align:center;
    }

    #gameOver { display:none; }

    #hud {
      position:absolute;
      top:10px;
      left:10px;
      color:white;
      font-size:18px;
    }

    button {
      padding:10px 20px;
      font-size:18px;
      cursor:pointer;
    }
  </style>
</head>
<body>

<div id="menu">
  <h1>🐱 CAT RUNNER</h1>
  <button onclick="startGame()">START</button>
</div>

<div id="gameOver">
  <h1>GAME OVER</h1>
  <button onclick="restartGame()">RESTART</button>
</div>

<div id="hud">
  Score: <span id="score">0</span> |
  Coins: <span id="coins">0</span> |
  Record: <span id="record">0</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>
// === СЦЕНА ===
const scene = new THREE.Scene();

// Камера (смотрит прямо на игрока)
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 6, 10);
camera.lookAt(0,0,0);

// Рендер
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Свет (ВАЖНО, иначе чёрный экран)
const light = new THREE.DirectionalLight(0xffffff, 1.2);
light.position.set(5,10,5);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambient);

// === ИГРОК (кот) ===
const cat = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,2),
  new THREE.MeshStandardMaterial({color:0xffaa00})
);
cat.position.y = 0.5;
scene.add(cat);

// === ДОРОГА ===
const road = new THREE.Mesh(
  new THREE.PlaneGeometry(20, 200),
  new THREE.MeshStandardMaterial({color:0x222222})
);
road.rotation.x = -Math.PI/2;
road.position.z = -50;
scene.add(road);

// === ПЕРЕМЕННЫЕ ===
let running = false;
let obstacles = [];
let coinsArr = [];

let score = 0;
let coins = 0;
let speed = 0.5;

let record = localStorage.getItem("record") || 0;
document.getElementById("record").innerText = record;

// === ЗВУК ===
let music;
function initMusic(){
  music = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3");
  music.loop = true;
  music.volume = 0.3;
}

// === УПРАВЛЕНИЕ ===
let left=false, right=false;
let velY=0, jumping=false;

document.addEventListener("keydown", e=>{
  if(e.key==="a") left=true;
  if(e.key==="d") right=true;

  if(e.code==="Space" && !jumping){
    velY=0.25;
    jumping=true;
  }
});

document.addEventListener("keyup", e=>{
  if(e.key==="a") left=false;
  if(e.key==="d") right=false;
});

// === СПАВН ===
function spawnObstacle(){
  const o = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshStandardMaterial({color:0xff0000})
  );
  o.position.x = (Math.random()-0.5)*8;
  o.position.z = -100;
  o.position.y = 0.5;

  scene.add(o);
  obstacles.push(o);
}

function spawnCoin(){
  const c = new THREE.Mesh(
    new THREE.TorusGeometry(0.4,0.15,8,16),
    new THREE.MeshStandardMaterial({color:0xffff00})
  );
  c.position.x = (Math.random()-0.5)*8;
  c.position.z = -100;
  c.position.y = 1.5;

  scene.add(c);
  coinsArr.push(c);
}

setInterval(()=>{ if(running) spawnObstacle(); },1200);
setInterval(()=>{ if(running) spawnCoin(); },1500);

// === БИОМЫ ===
function updateBiome(){
  if(score > 3000){
    scene.background = new THREE.Color(0x0066cc); // океан
    road.material.color.set(0x3399ff);
  }
  else if(score > 1000){
    scene.background = new THREE.Color(0xffcc66); // пустыня
    road.material.color.set(0xe6c27a);
  }
  else{
    scene.background = new THREE.Color(0x000000);
    road.material.color.set(0x222222);
  }
}

// === ИГРА ===
function startGame(){
  document.getElementById("menu").style.display = "none";

  initMusic();
  music.play();

  running = true;
}

function restartGame(){
  obstacles.forEach(o=>scene.remove(o));
  coinsArr.forEach(c=>scene.remove(c));

  obstacles = [];
  coinsArr = [];

  score = 0;
  coins = 0;
  speed = 0.5;

  cat.position.set(0,0.5,0);

  document.getElementById("gameOver").style.display = "none";
  running = true;
}

function gameOver(){
  running = false;
  music.pause();

  if(score > record){
    record = score;
    localStorage.setItem("record", record);
    document.getElementById("record").innerText = record;
  }

  document.getElementById("gameOver").style.display = "block";
}

// === LOOP ===
function animate(){
  requestAnimationFrame(animate);

  if(running){

    score++;
    speed += 0.0005;

    document.getElementById("score").innerText = score;
    document.getElementById("coins").innerText = coins;

    updateBiome();

    // движение
    if(left) cat.position.x -= 0.2;
    if(right) cat.position.x += 0.2;

    // прыжок
    cat.position.y += velY;
    velY -= 0.01;

    if(cat.position.y <= 0.5){
      cat.position.y = 0.5;
      jumping = false;
    }

    // камера
    camera.position.x += (cat.position.x - camera.position.x) * 0.1;

    // препятствия
    obstacles.forEach((o,i)=>{
      o.position.z += speed;

      if(Math.abs(o.position.x-cat.position.x)<1 &&
         Math.abs(o.position.z-cat.position.z)<1 &&
         cat.position.y < 1){
        gameOver();
      }

      if(o.position.z > 10){
        scene.remove(o);
        obstacles.splice(i,1);
      }
    });

    // монеты
    coinsArr.forEach((c,i)=>{
      c.rotation.y += 0.1;
      c.position.z += speed;

      if(Math.abs(c.position.x-cat.position.x)<1 &&
         Math.abs(c.position.z-cat.position.z)<1){
        coins++;
        scene.remove(c);
        coinsArr.splice(i,1);
      }

      if(c.position.z > 10){
        scene.remove(c);
        coinsArr.splice(i,1);
      }
    });

  }

  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
